# CI-only override: shifts host port bindings to a 1XXXX range so e2e workflows
# can run on a self-hosted runner without colliding with a local dev stack,
# and uses its own project name so cleanup (`docker compose down -v`) only
# removes CI containers/volumes — never the local dev stack.
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml up

name: portfolio-ci

services:
  traefik:
    ports:
      - "127.0.0.1:18080:80"
      - "127.0.0.1:18443:443"
      - "127.0.0.1:18081:81"
      - "127.0.0.1:18843:8443"
      - "127.0.0.1:18082:82"
      - "127.0.0.1:19002:8080"

  postgres:
    ports:
      - "127.0.0.1:15432:5432"

  redis:
    ports:
      - "127.0.0.1:16379:6379"

  minio:
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"

  rabbitmq:
    ports:
      - "127.0.0.1:25672:5672"
      - "127.0.0.1:35672:15672"

  localstack:
    ports:
      - "127.0.0.1:14566:4566"

  auth-service:
    ports:
      - "127.0.0.1:18084:8084"

  files-api:
    ports:
      - "127.0.0.1:18085:8085"
