# CI-only override: shifts host port bindings to a 1XXXX range so e2e workflows
# can run on a self-hosted runner without colliding with a local dev stack,
# and uses its own project name so cleanup (`docker compose down -v`) only
# removes CI containers/volumes — never the local dev stack.
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml up

name: portfolio-ci

services:
  traefik:
    container_name: traefik-ci
    # See rpg-ci traefik comment: scope to portfolio-ci compose project so this
    # instance doesn't pick up local-dev portfolio containers via shared docker
    # socket and round-robin into unreachable backends.
    command: !override
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=infrastructure_network_ci"
      - "--providers.docker.constraints=Label(`traefik.constraint-portfolio`,`true`) && Label(`com.docker.compose.project`,`portfolio-ci`)"
      - "--providers.file.directory=/config"
      - "--providers.file.watch=true"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addRoutersLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.admin.address=:81"
      - "--entrypoints.adminsecure.address=:8443"
      - "--entrypoints.swagger.address=:82"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.admin.http.redirections.entrypoint.to=adminsecure"
      - "--entrypoints.admin.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.admin.http.redirections.entrypoint.permanent=true"
    ports: !override
      - "127.0.0.1:18080:80"
      - "127.0.0.1:18443:443"
      - "127.0.0.1:18081:81"
      - "127.0.0.1:18843:8443"
      - "127.0.0.1:18082:82"
      - "127.0.0.1:19002:8080"

  postgres:
    container_name: postgres-ci
    ports: !override
      - "127.0.0.1:15432:5432"

  redis:
    container_name: redis-ci
    ports: !override
      - "127.0.0.1:16379:6379"

  minio:
    container_name: minio-ci
    ports: !override
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"

  minio-setup:
    container_name: minio-setup-ci

  rabbitmq:
    container_name: rabbitmq-ci
    ports: !override
      - "127.0.0.1:25672:5672"
      - "127.0.0.1:35672:15672"

  localstack:
    container_name: localstack-ci
    ports: !override
      - "127.0.0.1:14566:4566"

  flyway:
    container_name: flyway-ci

  auth-service:
    container_name: auth-service-ci
    image: infrastructure-auth-service
    # CI frontend origin is rpg-traefik on 18543. Without this override the
    # auth-service CORS allow-list comes from ALLOWED_ORIGINS_AUTH (defaulted
    # to local-dev origins) and login XHR from the SPA gets blocked, surfacing
    # as a "CORS error" in the browser.
    environment:
      ALLOWED_ORIGINS: "https://localhost:18543"
    ports: !override
      - "127.0.0.1:18084:8084"

  files-api:
    container_name: files-api-ci
    image: infrastructure-files-api
    environment:
      ALLOWED_ORIGINS: "https://localhost:18543"
    ports: !override
      - "127.0.0.1:18085:8085"

networks:
  network:
    name: infrastructure_network_ci
